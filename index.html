<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow" />
    <title>Digiiworks — Digital Marketing Agency South Africa</title>
    <meta name="description" content="Build, automate, and dominate. Digiiworks delivers custom web development, AI-powered automation, and data-driven SEO. Based in South Africa, serving clients globally.">
    <meta name="author" content="Digiiworks" />
    <link rel="canonical" href="https://digiiworks.co" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Digiiworks — Digital Marketing Agency South Africa" />
    <meta property="og:description" content="Build, automate, and dominate. Digiiworks delivers custom web development, AI-powered automation, and data-driven SEO. Based in South Africa, serving clients globally." />
    <meta property="og:url" content="https://digiiworks.co" />
    <meta property="og:image" content="https://digiiworks.co/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Digiiworks" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Digiiworks — Digital Marketing Agency South Africa" />
    <meta name="twitter:description" content="Build, automate, and dominate. Digiiworks delivers custom web development, AI-powered automation, and data-driven SEO. Based in South Africa, serving clients globally." />
    <meta name="twitter:image" content="https://digiiworks.co/og-image.png" />

    <!-- hreflang for geographic targeting -->
    <link rel="alternate" hreflang="en-za" href="https://digiiworks.co/" />
    <link rel="alternate" hreflang="en" href="https://digiiworks.co/" />
    <link rel="alternate" hreflang="x-default" href="https://digiiworks.co/" />

    <!-- JSON-LD Organization + ProfessionalService -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": ["Organization", "ProfessionalService"],
      "name": "Digiiworks",
      "url": "https://digiiworks.co",
      "logo": "https://digiiworks.co/logo.svg",
      "description": "Autonomous digital agency offering custom web development, AI-powered automation, data-driven SEO, and digital marketing services. Based in South Africa, serving clients globally.",
      "email": "hello@digiiworks.co",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "ZA",
        "addressLocality": "South Africa"
      },
      "areaServed": [
        { "@type": "Country", "name": "South Africa" },
        { "@type": "Place", "name": "Global" }
      ],
      "knowsLanguage": "en",
      "sameAs": [],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Digital Services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Custom Web Development", "description": "Bespoke websites engineered for performance, scalability, and conversion." } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Data-Driven SEO", "description": "Keyword strategy, technical audits, and content optimisation for organic growth." } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Responsive Web Design", "description": "Pixel-perfect experiences across every device and screen size." } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Google & Social Media Ads", "description": "Targeted ad campaigns across Google, Meta, and beyond." } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "AI Workflow Automation", "description": "n8n workflow automation and AI-powered content strategy." } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Social Media Management", "description": "AI-powered social media content creation and scheduling." } }
        ]
      }
    }
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=4" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg?v=4" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" /></noscript>
    <link rel="preload" href="/logo.svg" as="image" type="image/svg+xml" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
